<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby in Bloom - Baby Shower</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to the Baby in Bloom Shower!</h1>
    </header>
    <main>
        <section>
            <h2>Shower Information</h2>
            <p>Date: April 30, 2026</p>
            <p>Time: 1:00 PM - 4:00 PM</p>
            <p>Location: 123 Celebration Ave, Joytown, USA</p>
        </section>
        <section>
            <h2>RSVP</h2>
            <form id="rsvpForm">
                <label for="name">Your Name:</label>
                <input type="text" id="name" required>
                <label for="email">Your Email:</label>
                <input type="email" id="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
        <section>
            <h2>Registry</h2>
            <p>Please check our registry at: <a href="http://registry.website.com" target="_blank">Registry Link</a></p>
        </section>
        <section>
            <h2>Baby Picture Upload Game</h2>
            <p>Upload your favorite baby picture for our game!</p>
            <input type="file" id="babyPic" accept="image/*">
            <button id="uploadBtn">Upload</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
